name: Deploy Next.js site to Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm install
        working-directory: ./av-collect-ui        

      - name: Build Next.js site
        run: npm run build
        working-directory: ./av-collect-ui        

      - name: Upload static files
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./av-collect-ui/out              

  deploy:
    permissions:                                  
      pages: write
      id-token: write
    environment:
      name: github-pages

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
